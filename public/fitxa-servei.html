<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Fitxa del servei — EntreTeixits">
  <title>EntreTeixits — Detall del servei</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="manifest" href="/manifest.json" />
  </head>
<body>
<!--Capçalera i part fixa en totes les pàgines-->
  <header>
    <div class="navbar">
      <a href="index.html" class="logo" alt="EntreTeixits — Inici">
        <img src="../assets/img/logo-mark.svg" alt="" width="40" height="40">
        <span class="logo-word">EntreTeixits</span>
      </a>
      <!--Menú que només s'activa en mobile-->
      <a href="login.html" class="nav-login-mobile">Inicia sessió</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <!--Menú desktop-->
      <nav id="main-nav">
        <a href="index.html">Inici</a>
        <a href="funcionament.html">Com funciona</a>
        <a href="serveis.html"  class="active">Serveis</a>
        <a href="ajudes-recursos.html">Ajudes i recursos</a>
        <span id="nav-auth">
          <a href="login.html" class="nav-sessio">Inicia sessió</a>
          <a href="registre.html" class="btn">Registra't</a>
        </span>
      </nav>
    </div>
  </header>
  <!-- Divideixo la pàgina en dos blocs: informació complementaria i resum amb l'opció de contactar-->
  <main>
    <!-- Opció de Tornar enrere -->
    <a href="serveis.html" class="back-link">
      <img src="../assets/img/arrow-left.svg">
      Tornar als serveis
    </a>
    <!-- Missateg de carregant informació -->
    <div id="fitxa-loading">
      <div class="wait"></div>
      Carregant informació del servei…
    </div>
    <!-- Secció ampliada del servei-->
    <article class="service-detail" id="fitxa-contingut" style="display:none;">
      <div class="fitxa-layout">
        <!-- BLOC 1. Descripció complerta -->
        <div class="fitxa-main">
          <div id="fitxa-inicial" class="fitxa-inicial" aria-hidden="true" style="display:none;">
            <span class="card-initial"></span>
          </div>
           <div class="fitxa-header">
            <div>
              <h1 id="fitxa-nom"></h1>
              <p id="fitxa-categoria" class="fitxa-cat-indicador"></p>
            </div>
            <button id="btn-favorit" class="btn-favorit" title="Afegir a favorits">☆</button>
          </div>
          
          <div class="fitxa-informacio">
            <div class="fitxa-informacio-row">
            <img src="../assets/img/map-pin.svg" alt="">
              <p id="fitxa-adreca"></p>
            </div>

            <div class="fitxa-informacio-row valoracio">
              <img src="../assets/img/star-fill.svg" alt="">
              <p id="fitxa-rating"></p>
            </div>

          </div>

          <!-- Descripció -->
          <section id="seccio-descripcio" style="display:none;">
            <h2>Descripció</h2>
            <p id="fitxa-descripcio"></p>
          </section>
          <div class="fitxa-actions" id="fitxa-actions">
          </div>
        </div>

        <!-- BLOC 2. Resum i contacte -->
        <aside class="fitxa-sidebar">
          <div class="fitxa-targeta">
            <a id="btn-contactar" href="#">Contactar</a>
            <a id="fitxa-web" href="#" target="_blank" rel="noopener" style="display:none;">
              Visita la web oficial
            </a>
            <hr class="fitxa-targeta-divisor">

            <!-- Info de contacte ràpida -->
            <div class="fitxa-targeta-contact">
              <div class="fitxa-targeta-contact-row">
                <img src="../assets/img/phone.svg" alt="">
                <span id="fitxa-card-telefon">—</span>
              </div>
              <div class="fitxa-targeta-contact-row">
                <img src="../assets/img/map-pin.svg" alt="">
                <span id="fitxa-card-adreca">—</span>
              </div>
              <div class="fitxa-targeta-contact-row">
                <img src="../assets/img/rellotge.svg" alt="">
                <span id="fitxa-card-horari">—</span>
              </div>
            </div>
          </div>
        </aside>
      </div>
    </article>
  </main>
<!--Footer. Part fixa-->
  <footer>
    <div class="footer-inner">
      <span class="footer-brand">EntreTeixits</span>
      <span class="footer-copy">© 2026 EntreTeixits. Tots els drets reservats.</span>
    </div>
  </footer>
</body>

  <script src="../scripts/js/estat-usuari.js"></script>
  <script src="../scripts/js/fitxa-servei.js"></script>


</html>
