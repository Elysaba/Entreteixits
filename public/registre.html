<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Crea el teu compte a EntreTeixits i accedeix a serveis verificats prop teu.">
  <title>EntreTeixits — Registra't</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="manifest" href="/manifest.json" />
</head>
<body>
  <!--Capçalera i part fixa en totes les pàgines-->
  <header>
    <div class="navbar">
      <a href="index.html" class="logo" alt="EntreTeixits — Inici">
        <img src="../assets/img/logo-mark.svg" alt="" width="40" height="40">
        <span class="logo-word">EntreTeixits</span>
      </a>
      <!--Menú que només s'activa en mobile-->
      <a href="login.html" class="nav-login-mobile">Inicia sessió</a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </label>
      <!--Menú desktop-->
      <nav id="main-nav">
        <a href="index.html">Inici</a>
        <a href="funcionament.html">Com funciona</a>
        <a href="serveis.html">Serveis</a>
        <a href="ajudes-recursos.html">Ajudes i recursos</a>
        <span id="nav-auth">
          <a href="login.html" class="nav-sessio">Inicia sessió</a>
          <a href="registre.html" class="btn">Registra't</a>
        </span>
      </nav>
    </div>
  </header>
    <!--Formulari de registres, i que consta de 2 pasos-->
    <!--PAS 1 DADES BÀSIQUES-->
  <main>
    <div class="formulari-login">
      <section class="login-form">
        <h1 id="registre-heading">Crea el teu compte</h1>
        <p class="login-subtitol" id="auth-step-label">Pas 1 de 2 · Dades bàsiques</p>
        <!-- Indicador de pas -->
        <div class="passos-barra" role="progressbar">
          <div class="passos-punt active" id="step-dot-1"></div>
          <div class="passos-punt" id="step-dot-2"></div>
        </div>
        <!-- PAS 1: dades bàsiques -->
        <form id="form-registre-1" action="../scripts/php/registre.php" method="post" novalidate>
          <input type="hidden" name="pas" value="1">
          <div class="field-group">
            <label for="name">Nom</label>
            <input type="text" id="name" name="name" autocomplete="given-name" required placeholder="El teu nom">
            <span id="error-nom" class="error-missatge" role="alert"></span>
          </div>
          <div class="field-group">
            <label for="email">Correu electrònic</label>
            <input type="email" id="email" name="email" autocomplete="email" required placeholder="nom@exemple.cat">
            <span id="error-email" class="error-missatge" role="alert"></span>
          </div>
          <div class="field-group">
            <label for="password">Contrasenya</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8">
            <span id="error-password" class="error-missatge" role="alert"></span>
            <span class="error-missatge" style="font-weight: 400; margin-top: 4px;">Mínim 8 caràcters.</span>
          </div>

          <label class="check-row">
            <input type="checkbox" name="privacitat" id="privacitat" required>
            Accepto les polítiques de privacitat
          </label>
          <span id="error-privacitat" class="error-missatge" role="alert"></span>
          <button type="submit">Continuar</button>
          <p class="small">
            Ja tens compte? <a href="login.html">Inicia sessió</a>
          </p>
        </form>
      </section>
    </div>
  </main>
<!--Footer. Part fixa-->
  <footer>
    <div class="footer-inner">
      <span class="footer-brand">EntreTeixits</span>
      <span class="footer-copy">© 2026 EntreTeixits. Tots els drets reservats.</span>
    </div>
  </footer>
</body>
<!--Els scripts que estan relacionats en aquesta pàgina és de validació de registre-->
  <script src="../scripts/js/estat-usuari.js"></script>
  <script src="../scripts/js/validacio-registre.js"></script>
</html>
